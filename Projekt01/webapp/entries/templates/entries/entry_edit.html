{% extends 'layout.html' %}

{% block title %}
    Edit Entry
{% endblock %}    

{% block content %}
    <div class="container">
        <section>
            <h1>Edit Entry</h1> 
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Update Entry</button>
            </form>
            <br>
            <a href="{% url 'entries:page' slug=entry.slug %}">Cancel</a>
        </section>
    </div>
{% endblock %}
