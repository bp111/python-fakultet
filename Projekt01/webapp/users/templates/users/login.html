{% extends 'layout.html' %}

{% block title %}
    Log In
{% endblock %}    

{% block content %}
    <div class="container">
        <h1>Log into your account</h1>
        <form action="/users/login/" method="post">
            {% csrf_token %}
            {{ form }}
            <button>Submit</button>
        </form>
    </div>
{% endblock %}
